; PlatformIO Project Configuration File
;
; Build options: build flags, source filter
; Upload options: custom upload port, speed and extra flags
; Library options: dependencies, extra library storages
; Advanced options: extra scripting
;
; Lab 1.1: Serial Communication with STDIO - LED Control System

[env:uno]
platform = atmelavr
board = uno
framework = arduino
monitor_speed = 9600
monitor_port = COM3
upload_speed = 115200

; Build flags for stdio support
build_flags = 
    -D USE_SERIAL_STDIO
    -Wno-error=unused-variable
    -D F_CPU=16000000L

; Enable extended core with stdio support
lib_ldf_mode = deep
lib_deps =
    arduino-libraries/LiquidCrystal @ ^1.0.7
; Monitor settings
monitor_echo = yes
monitor_eol = CRLF
